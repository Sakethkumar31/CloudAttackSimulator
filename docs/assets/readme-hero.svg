<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Attack Path Simulator</title>
  <desc id="desc">Presentation banner for the Cloud Attack Path Simulator project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111d"/>
      <stop offset="55%" stop-color="#0b1b2d"/>
      <stop offset="100%" stop-color="#081019"/>
