services:
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caldera:
    image: ${DOCKERHUB_NAMESPACE}/cloud-attack-lab-caldera:${IMAGE_TAG:-latest}
    container_name: caldera
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "8443:8443"
      - "7010:7010"
      - "7011:7011/udp"
      - "7012:7012"
      - "8853:8853"
      - "8022:8022"
      - "2222:2222"
    environment:
      CALDERA_PORT: ${CALDERA_PORT:-8888}
      CALDERA_HOST: ${CALDERA_HOST:-0.0.0.0}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      TZ: ${TZ:-UTC}
    volumes:
      - caldera_data:/usr/src/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  neo4j-sync:
    image: ${DOCKERHUB_NAMESPACE}/cloud-attack-lab-neo4j-sync:${IMAGE_TAG:-latest}
    container_name: neo4j-sync
    restart: unless-stopped
    environment:
      CALDERA_URL: ${CALDERA_URL:-http://caldera:8888}
      CALDERA_API_KEY: ${CALDERA_API_KEY:-}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: "1"
      SYNC_INTERVAL: ${SYNC_INTERVAL:-30}
    depends_on:
      caldera:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  graph-writer:
    image: ${DOCKERHUB_NAMESPACE}/cloud-attack-lab-graph-writer:${IMAGE_TAG:-latest}
    container_name: graph-writer
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: "1"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  dashboard:
    image: ${DOCKERHUB_NAMESPACE}/cloud-attack-lab-dashboard:${IMAGE_TAG:-latest}
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: ${FLASK_APP:-app.py}
      CALDERA_URL: ${CALDERA_URL:-http://caldera:8888}
      CALDERA_API_KEY: ${CALDERA_API_KEY:-}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      DASHBOARD_USER: ${DASHBOARD_USER:-socadmin}
      DASHBOARD_PASS: ${DASHBOARD_PASS:-replace_with_dashboard_password}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-replace_with_flask_secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      PYTHONUNBUFFERED: "1"
    depends_on:
      neo4j:
        condition: service_healthy
      caldera:
        condition: service_healthy

volumes:
  neo4j_data:
  redis_data:
  caldera_data:
