<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Attack Path Simulator - Login</title>
  <style>
    body {
      margin: 0;
      background: #05070a;
      color: #00ffcc;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .box {
      width: min(90vw, 360px);
      background: #111;
      padding: 28px;
      border: 1px solid #00ffcc;
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.35);
    }
    h2 {
      margin-top: 0;
      margin-bottom: 18px;
      text-align: center;
    }
    input,
    button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 8px 0;
      background: #000;
      color: #00ffcc;
      border: 1px solid #00ffcc;
    }
    button {
      background: #00ffcc;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }
    .error {
      color: #ff4c4c;
      margin-bottom: 10px;
    }
    .sub {
      color: #8adfc9;
      text-align: center;
      margin-bottom: 14px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Cloud Attack Path Simulator</h2>
    <div class="sub">SOC Digital Twin for Attack-Path Detection, Simulation, and Mitigation</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
      <input name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">ACCESS</button>
    </form>
    <div style="text-align:center;margin-top:10px;">
      <a href="/ctf/register" style="color:#8adfc9;">Student CTF Registration</a>
    </div>
  </div>
</body>
</html>
