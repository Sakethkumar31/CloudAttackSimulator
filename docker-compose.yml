name: cloud-attack-lab

networks:
  attack-lab:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: neo4j
    mem_limit: 640m
    cpus: 1.0
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_apoc_export_file_enabled: 'true'
      NEO4J_apoc_import_file_enabled: 'true'
      NEO4J_apoc_http_timeout_connect: 60000
      NEO4J_server_memory_heap_initial__size: 128m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 128m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      attack-lab:
        ipv4_address: 172.25.0.3
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 >/dev/null 2>&1 && bash -lc \"</dev/tcp/localhost/7687\" >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    mem_limit: 256m
    cpus: 0.25
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      attack-lab:
        ipv4_address: 172.25.0.4
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Caldera C2 Framework - BACKEND SERVER
  caldera:
    image: caldera:latest
    container_name: caldera
    mem_limit: 1024m
    cpus: 1.0
    ports:
      - "8888:8888"
      - "8443:8443"
      - "7010:7010"
      - "7011:7011/udp"
      - "7012:7012"
      - "8853:8853"
      - "8022:8022"
      - "2222:2222"
    environment:
      CALDERA_PORT: ${CALDERA_PORT:-8888}
      CALDERA_HOST: ${CALDERA_HOST:-0.0.0.0}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      TZ: ${TZ}
    volumes:
      - ${CALDERA_WSL_DIR}:/usr/src/app
      - caldera_data:/usr/src/app/data
    networks:
      attack-lab:
        ipv4_address: 172.25.0.2
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Sync Worker - Event Processing
  neo4j-sync:
    build:
      context: .
      dockerfile: services/neo4j-sync/Dockerfile
    container_name: neo4j-sync
    mem_limit: 384m
    cpus: 0.5
    environment:
      CALDERA_URL: ${CALDERA_URL}
      CALDERA_API_KEY: ${CALDERA_API_KEY}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: 1
      SYNC_INTERVAL: ${SYNC_INTERVAL:-30}
    volumes:
      - ./caldera_neo4j:/app/caldera_neo4j:ro
    depends_on:
      caldera:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      attack-lab:
        ipv4_address: 172.25.0.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://neo4j:7474', timeout=5)\" || exit 1"]
      interval: 30s
      retries: 5

  # Graph Writer - Neo4j Updates
  graph-writer:
    build:
      context: .
      dockerfile: services/graph_writer/Dockerfile
    container_name: graph-writer
    mem_limit: 384m
    cpus: 0.5
    environment:
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    working_dir: /app
    command: python -u /app/services/graph_writer/main.py
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      caldera:
        condition: service_healthy
    networks:
      attack-lab:
        ipv4_address: 172.25.0.6
    healthcheck:
      test: ["CMD", "python3", "-c", "import redis; redis.Redis(host='redis').ping()"]
      interval: 15s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Dashboard Web UI
  dashboard:
    build:
      context: .
      dockerfile: dashboard_web/Dockerfile
    container_name: dashboard
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: ${FLASK_APP:-app.py}
      CALDERA_URL: ${CALDERA_URL}
      CALDERA_API_KEY: ${CALDERA_API_KEY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      DASHBOARD_USER: ${DASHBOARD_USER:-socadmin}
      DASHBOARD_PASS: ${DASHBOARD_PASS:-replace_with_dashboard_password}
      GEOIP_URL: ${GEOIP_URL:-https://ipapi.co/{ip}/json/}
      GEOIP_API_KEY: ${GEOIP_API_KEY:-}
      GEOIP_PROVIDER_LABEL: ${GEOIP_PROVIDER_LABEL:-ipapi.co}
      GEOIP_CACHE_SECONDS: ${GEOIP_CACHE_SECONDS:-1800}
      PUBLIC_IP_LOOKUP_URL: ${PUBLIC_IP_LOOKUP_URL:-https://api.ipify.org?format=json}
      ANALYST_LOCATION_QUERY: ${ANALYST_LOCATION_QUERY:-}
      ANALYST_LATITUDE: ${ANALYST_LATITUDE:-}
      ANALYST_LONGITUDE: ${ANALYST_LONGITUDE:-}
      GEOCODE_URL: ${GEOCODE_URL:-https://nominatim.openstreetmap.org/search}
      GEOCODE_USER_AGENT: ${GEOCODE_USER_AGENT:-cloud-attack-lab-dashboard/1.0}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      caldera:
        condition: service_healthy
    networks:
      attack-lab:
        ipv4_address: 172.25.0.7
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000', timeout=5)\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  redis_data:
    driver: local
  caldera_data:
    driver: local
