version: "3.9"

services:
  neo4j:
    image: neo4j:5
    container_name: caldera_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-neo4jpassword}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u \"${NEO4J_USER:-neo4j}\" -p \"${NEO4J_PASSWORD:-neo4jpassword}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: caldera_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  dashboard:
    build:
      context: ..
      dockerfile: dashboard_web/Dockerfile
    container_name: soc_dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NEO4J_URI: ${NEO4J_URI:-neo4j://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-redops_secure_key}
      DASHBOARD_USER: ${DASHBOARD_USER:-socadmin}
      DASHBOARD_PASS: ${DASHBOARD_PASS:-replace_with_dashboard_password}
      ALLOW_MULTI_USER: ${ALLOW_MULTI_USER:-1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      neo4j:
        condition: service_healthy

  sync_worker:
    build:
      context: ..
      dockerfile: services/sync_worker/Dockerfile
    container_name: sync_worker
    restart: unless-stopped
    environment:
      CALDERA_URL: ${CALDERA_URL:-http://host.docker.internal:8888}
      CALDERA_API_KEY: ${CALDERA_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      STREAM_NAME: caldera.links.v1
      POLL_INTERVAL_SECONDS: 5
      REQUEST_TIMEOUT_SECONDS: 15
    depends_on:
      redis:
        condition: service_healthy

  graph_writer:
    build:
      context: ..
      dockerfile: services/graph_writer/Dockerfile
    container_name: graph_writer
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      STREAM_NAME: caldera.links.v1
      DLQ_STREAM: caldera.links.dlq
      PUBSUB_CHANNEL: graph.updated
      CONSUMER_GROUP: writers
      CONSUMER_NAME: writer-1
      MAX_RETRIES: 5
      BLOCK_MS: 5000
      NEO4J_URI: ${NEO4J_URI:-neo4j://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:

